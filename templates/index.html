<!DOCTYPE html>
<html>
<head>
    <title>Wikidata Reference Validator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
    <div class="container">
        <h1 class="mb-4">🔍 Wikidata Reference Validator</h1>
        <div class="input-group mb-3">
            <input type="text" id="qid" class="form-control" placeholder="Enter a Wikidata QID (e.g., Q42)">
            <button class="btn btn-primary" onclick="validate()">Validate</button>
        </div>
        <div id="result" class="mt-4"></div>
    </div>

    <script>
        async function validate() {
            const qid = document.getElementById("qid").value;
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "<em>Checking...</em>";

            try {
                const response = await fetch("/validate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ qid })
                });
                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    return;
                }
                if (data.message) {
                    resultDiv.innerHTML = `<div class="alert alert-warning">${data.message}</div>`;
                    return;
                }

                let html = `<h3>Results for ${qid}</h3><ul class="list-group">`;
                data.forEach(ref => {
                    const badge = ref.status === "alive" ? "success" : "danger";
                    html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                                <a href="${ref.url}" target="_blank">${ref.url}</a>
                                <span class="badge bg-${badge}">${ref.status}</span>
                             </li>`;
                });
                html += "</ul>";
                resultDiv.innerHTML = html;

            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${err}</div>`;
            }
        }
    </script>
</body>
</html>
