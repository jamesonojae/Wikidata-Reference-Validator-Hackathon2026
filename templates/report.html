<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reference Validation Report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
    }

    h2 {
      font-weight: 600;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }

    .accordion-button .ref-url {
      display: inline-block;
      max-width: 250px;   /* truncate long urls */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .accordion-body a {
      display: inline-block;
      max-width: 250px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="container my-5">
  <!-- Title -->
  <h2 class="mb-4 text-center">📊 Reference Validation Report</h2>

  <!-- Summary badges -->
  <div class="d-flex justify-content-center gap-4 mb-4">
    <span class="badge bg-success p-3 fs-6">
      ✅ Alive: <span id="aliveCount">0</span>
    </span>
    <span class="badge bg-danger p-3 fs-6">
      ❌ Dead: <span id="deadCount">0</span>
    </span>
  </div>

  <!-- Charts -->
  <div class="row mb-4">
    <!-- Pie Chart -->
    <div class="col-md-6 mb-4">
      <div class="card">
        <div class="card-body text-center">
          <h5 class="card-title">Alive vs Dead (Pie)</h5>
          <div class="chart-container">
            <canvas id="refChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Bar Chart -->
    <div class="col-md-6 mb-4">
      <div class="card">
        <div class="card-body text-center">
          <h5 class="card-title">Alive vs Dead (Histogram)</h5>
          <div class="chart-container">
            <canvas id="refBarChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detailed References -->
  <div class="card mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Detailed References</h5>
      <div class="accordion" id="refAccordion"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="text-center mt-4 d-flex justify-content-center gap-2">
    <a href="{{ url_for('home') }}" class="btn btn-secondary">🔄 New Validation</a>
    <button id="downloadBtn" class="btn btn-success">⬇️ Download Results</button>
  </div>
</div>

<script>
  const raw = localStorage.getItem("reportData");
  if (raw) {
    const report = JSON.parse(raw);

    // Fill badges
    document.getElementById("aliveCount").textContent = report.aliveCount;
    document.getElementById("deadCount").textContent = report.deadCount;

    // Pie Chart
    new Chart(document.getElementById("refChart"), {
      type: "pie",
      data: {
        labels: ["Alive", "Dead"],
        datasets: [{
          data: [report.aliveCount, report.deadCount],
          backgroundColor: ["#28a745", "#dc3545"]
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });

    // Histogram (Bar Chart)
    new Chart(document.getElementById("refBarChart"), {
      type: "bar",
      data: {
        labels: ["Alive", "Dead"],
        datasets: [{
          label: "References",
          data: [report.aliveCount, report.deadCount],
          backgroundColor: ["#28a745", "#dc3545"]
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    });

    // Accordion for references
    const accordion = document.getElementById("refAccordion");
    report.references.forEach((ref, i) => {
      const item = document.createElement("div");
      item.className = "accordion-item";
      item.innerHTML = `
        <h2 class="accordion-header" id="heading${i}">
          <button class="accordion-button collapsed d-flex justify-content-between align-items-center"
            type="button"
            data-bs-toggle="collapse" data-bs-target="#collapse${i}"
            aria-expanded="false" aria-controls="collapse${i}">
            <span class="ref-url" title="${ref.url}">
              ${ref.url}
            </span>
            <span class="ms-2">
              ${ref.status === "alive" ? "✅ Alive" : "❌ Dead"}
            </span>
          </button>
        </h2>
        <div id="collapse${i}" class="accordion-collapse collapse"
          aria-labelledby="heading${i}" data-bs-parent="#refAccordion">
          <div class="accordion-body">
            <p><strong>Property:</strong> ${ref.propertyLabel}</p>
            ${ref.statementValue ? `<p><strong>Value:</strong> ${ref.statementValue}</p>` : ""}
            <p><a href="${ref.url}" target="_blank" title="${ref.url}">${ref.url}</a></p>
            ${
              ref.status === "dead"
              ? `<div class="alert alert-warning p-2 mt-2">
                   ⚠️ Suggestion: Please review or update this reference.
                 </div>`
              : ""
            }
          </div>
        </div>
      `;
      accordion.appendChild(item);
    });
  } else {
    // If opened without validation
    document.body.innerHTML = `
      <div class="container my-5 text-center">
        <div class="alert alert-warning">
          ⚠️ No report data found. Please run a validation first.
        </div>
        <a href="{{ url_for('home') }}" class="btn btn-primary">Go Back</a>
      </div>
    `;
  }

  // Handle Download CSV
  const downloadBtn = document.getElementById("downloadBtn");
  if (downloadBtn) {
    downloadBtn.onclick = () => {
    };
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
