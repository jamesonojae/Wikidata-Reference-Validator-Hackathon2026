<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reference Validation Report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container my-5">
  <h2 class="mb-4">📊 Reference Validation Report</h2>

  <!-- Summary badges -->
  <div class="d-flex justify-content-around mb-4">
    <span class="badge bg-success p-3 fs-6">
      ✅ Alive: <span id="aliveCount">0</span>
    </span>
    <span class="badge bg-danger p-3 fs-6">
      ❌ Dead: <span id="deadCount">0</span>
    </span>
  </div>

  <!-- Row: Chart + List -->
  <div class="row">
    <!-- Pie Chart -->
    <div class="col-md-4 text-center mb-4">
      <canvas id="refChart" width="200" height="200"></canvas>
    </div>

    <!-- Collapsible List -->
    <div class="col-md-8">
      <div class="accordion" id="refAccordion"></div>
    </div>
  </div>

  <!-- Back Button -->
 <div class="text-center mt-4 d-flex justify-content-center gap-2">
  <a href="{{ url_for('home') }}" class="btn btn-secondary">🔄 New Validation</a>
  <button id="downloadBtn" class="btn btn-success">⬇️ Download Results</button>
</div>

<script>
  const raw = localStorage.getItem("reportData");
  if (raw) {
    const report = JSON.parse(raw);

    // Fill badges
    document.getElementById("aliveCount").textContent = report.aliveCount;
    document.getElementById("deadCount").textContent = report.deadCount;

    // Chart
    new Chart(document.getElementById("refChart"), {
      type: "pie",
      data: {
        labels: ["Alive", "Dead"],
        datasets: [{
          data: [report.aliveCount, report.deadCount],
          backgroundColor: ["#28a745", "#dc3545"]
        }]
      }
    });

    // Accordion for references
    const accordion = document.getElementById("refAccordion");
    report.references.forEach((ref, i) => {
      const item = document.createElement("div");
      item.className = "accordion-item";
      item.innerHTML = `
        <h2 class="accordion-header" id="heading${i}">
          <button class="accordion-button collapsed" type="button"
            data-bs-toggle="collapse" data-bs-target="#collapse${i}"
            aria-expanded="false" aria-controls="collapse${i}">
            ${ref.url} — ${ref.status === "alive" ? "✅ Alive" : "❌ Dead"}
          </button>
        </h2>
        <div id="collapse${i}" class="accordion-collapse collapse"
          aria-labelledby="heading${i}" data-bs-parent="#refAccordion">
          <div class="accordion-body">
            <p><strong>Property:</strong> ${ref.propertyLabel}</p>
            ${ref.statementValue ? `<p><strong>Value:</strong> ${ref.statementValue}</p>` : ""}
            <p><a href="${ref.url}" target="_blank">${ref.url}</a></p>
            ${
              ref.status === "dead"
              ? `<div class="alert alert-warning p-2 mt-2">
                   ⚠️ Suggestion: Please review or update this reference.
                 </div>`
              : ""
            }
          </div>
        </div>
      `;
      accordion.appendChild(item);
    });
  } else {
    // If opened without validation
    document.body.innerHTML = `
      <div class="container my-5 text-center">
        <div class="alert alert-warning">
          ⚠️ No report data found. Please run a validation first.
        </div>
        <a href="{{ url_for('home') }}" class="btn btn-primary">Go Back</a>
      </div>
    `;
  }
  // Handle Download CSV
const downloadBtn = document.getElementById("downloadBtn");
if (downloadBtn) {
  downloadBtn.onclick = () => {
    const results = localStorage.getItem("reportData");
    if (!results) {
      alert("No report data available to download.");
      return;
    }

    const report = JSON.parse(results);

    // Convert to CSV
    const headers = ["URL", "Status", "Property", "Value"];
    const rows = report.references.map(r => [
      `"${r.url}"`,
      r.status,
      `"${r.propertyLabel}"`,
      r.statementValue ? `"${r.statementValue}"` : ""
    ]);

    const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");

    // Trigger download
    const blob = new Blob([csvContent], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `validation-report-${report.qid || "wikidata"}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
  };
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
